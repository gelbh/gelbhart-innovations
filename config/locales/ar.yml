            prompt: "هل تريد معرفة أو الإبلاغ عن الأثر الحقيقي لمنتجك وعملياتك؟"
            details: باستخدام منهجيات وأدوات الجرد الحديثة، نقيم ونراجع أثر دورة الحياة عبر عروضكم. النتيجة هي معلومات واضحة تدعم القرار وتساعدكم على ترتيب أولويات التحول المستدام وصياغة الاستراتيجية المستقبلية.
