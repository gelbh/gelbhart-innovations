              - خفض المخاطر
              - مراجعة الجاهزية
            prompt: "هل تريد أن تكون مستعداً بل ومتقدماً على التشريعات المناخية القادمة التي قد تؤثر على أعمالك؟"
            details: نجري مراجعة امتثال خطوة بخطوة لعملياتكم ونقيم مستوى الاستعداد للأنظمة المناخية القادمة. ستحصلون على خطة عمل واضحة لتعزيز الشفافية وتقليل التعرض للمخاطر والتقدم على المنافسين.
          circular_design:
            title: تصميم وتطوير الأعمال الدائرية
            outcome: إعادة تصميم العمليات ونموذج الأعمال لاستخراج قيمة دائرية.
            tags:
              - الدائرية
              - تصميم العمليات
              - الاحتفاظ بالقيمة
            prompt: "هل تريد التحول إلى نموذج دائري أو معرفة ما يمكن أن يقدمه التصميم الدائري لشركتك؟"
            details: نحدد فرص إعادة تصميم استراتيجية تنقل أعمالكم نحو التشغيل الدائري. التركيز يكون على قرارات واقعية وعالية الأثر تضع شركتكم في موقع أفضل للمراحل القادمة من تطور القطاع.
          low_cost:
