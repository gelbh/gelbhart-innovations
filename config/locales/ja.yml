        - 当ウェブサイトには、第三者のウェブサイトへのリンクが含まれている場合があります。当社は、これらの外部サイトの可用性、コンテンツ、またはプライバシー慣行について責任を負いません。
        - 当社は、保証や表明なしに、このウェブサイトを「現状のまま」提供します。当社は、直接的、間接的、偶発的、または結果的な損害を含むがこれに限定されない、ウェブサイトの使用に起因するいかなる損害についても責任を負いません。
        - いかなる場合も、当社は、このウェブサイトの使用に関連して100ドルを超える請求、損失、または損害について責任を負いません。
        - これらの条項はスイスの法律に準拠します。紛争はスイスの裁判所で解決されます。
    privacy:
      title: プライバシーポリシー
      items:
        - 当社は、お客様が提供する情報、および当社のウェブサーバーとブラウザーによって自動的に収集される情報を収集する場合があります。この情報を使用して、サービスの提供と改善を行います。
        - 当社は、ウェブサイトの運営とお客様へのサービス提供を支援する第三者サービスプロバイダーと情報を共有する場合があります。当社は、お客様の個人情報を第三者に販売または賃貸することはありません。
        - 必要に応じて Cookie や類似の手段で設定の保存やサイトの利用状況の把握に使います。ブラウザー設定で調整できます。
