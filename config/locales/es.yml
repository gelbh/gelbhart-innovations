    privacy:
      title: Política de privacidad
      items:
        - Podemos recopilar información proporcionada por usted, así como información recogida automáticamente por nuestro servidor web y navegador. Utilizamos esta información para ofrecer y mejorar nuestros servicios.
        - Podemos compartir su información con terceros proveedores de servicios que nos ayudan a operar el sitio web y servir a nuestros clientes. No vendemos ni alquilamos su información personal a terceros.
        - Utilizamos cookies y herramientas similares cuando hace falta para recordar preferencias y ver cómo se usa el sitio. Puede ajustarlo en la configuración del navegador.
