      bio: Bareket 就读于以色列理工学院（Technion），获得化学学士学位，主修有机化学。<br><br>她精通希伯来语和英语，可以用意大利语交流。Bareket 拥有 Microsoft Word、Excel 和 PowerPoint 的高级知识。<br><br>她与家人居住在瑞士提契诺州，因工作经常出行。<br><br>Bareket 是一位热情的厨师和忠实的足球迷。
    yaron:
      name: Yaron Gelbhart
      bio: Yaron 就读于以色列理工学院（Technion），获得工程学理学士学位，主修项目管理。Yaron 拥有超过 20 年的大型项目管理经验，重点关注印度次大陆。<br><br>他的兴趣还涉及房地产和酒店业。他精通英语和希伯来语，意大利语达到会话水平。在业余时间，Yaron 练习瑜伽并喜欢喝一杯好意大利葡萄酒。
    tomer:
      name: Tomer Gelbhart
      bio: 都柏林大学学院计算机科学硕士生，计算机科学本科，并修读经典与量子机器学习相关课程。<br><br>我搭建前端并对接 API，做日常工作中使用的工具。<br><br>硕士阶段主要在学习与项目中接触量子计算与机器学习的结合。<br><br>欢迎机器学习、量子计算或软件工程方向的人联系。
    effie:
      name: Effie Gelbhart
      bio: Effie 在读创新管理硕士，可持续创新学士，关注可持续转型。背景包括可持续发展与创新、CSR 报告、商业模式可持续性评估以及该领域的近期实践。<br><br>她重视可持续议题上的清晰沟通与高效流程。
  services_data:
    pharmaceutical:
      due_diligence:
        title: 尽职调查
        subtitle: 您是否正在考虑购买新的制药资产，无论是产品还是公司？
        description: 凭借在制药行业超过 27 年的经验，我们为任何制药产品和制药公司的尽职调查提供协助和建议，包括评估、评价、构建、谈判和完成潜在投资。
      business_development:
        title: 业务开发（合作伙伴关系）
        subtitle: 您是否正在开发新产品并寻找最佳合作伙伴，或者希望许可您的产品？
        description: 凭借我们的行业经验和知识，我们可以在全球范围内为您的 API、FDF 和/或孤儿仿制药找到合适的合作伙伴。
      portfolio:
        title: 投资组合
        subtitle: 正在寻找新分子但不知道从哪里开始？
        description: 凭借我们的化学背景和行业知识，我们可以帮助您找到要开发的合适分子，无论它们是小型利基分子还是未来的重磅产品，是面包和黄油还是珍珠。我们将在考虑知识产权、定价和竞争后定义开发策略。
      strategy:
        title: 战略
        subtitle: 不确定您的公司应该走哪条路？
        description: 我们将研究和识别市场需求和市场潜力，为公司投资组合开发商业机会。然后，我们将定位新客户和新市场，在这些市场中公司的潜力尚未完全实现。我们将评估当前的销售团队并推荐合适的结构，识别销售人员并培训他们。在审查代理网络后，我们将建议在何处以及是否通过代理或直接工作。我们将定义理想的管道流程、KPI 和组织，并评估竞争对手的状况。
      orphan_drugs:
        title: 仿制孤儿药
        subtitle: 您是否正在开发仿制孤儿药？
        description: 在许多情况下，这意味着投资于小型利基产品的开发，但这并不意味着市场潜力也很小。每个市场对孤儿药都有自己的规则，在许多情况下，品牌产品在特定地点未获批准或未上市。我们将识别相关市场并找到合适的当地合作伙伴、医生（KOL）、患者和患者协会，使您能够快速有效地提供产品，在开发的早期阶段实现利润。
      product_launch:
        title: 新产品发布
        subtitle: 营销授权即将到来，但产品尚未准备好发布？
        description: 我们将评估情况并指导您的供应商（API 和/或 FDF）如何开发其产能、打开瓶颈、快速有效地解决制造程序中的质量问题，以实现顺利和及时的发布。
    real_estate:
      land_identification:
        title: 土地和机会识别
        description:
          - 为住宅、酒店、休闲与商业寻找土地。
          - 市场研究与可行性研究。
          - 分区、基础设施与长期价值。
      acquisition:
        title: 收购和构建
        description:
          - 管理土地购买谈判和尽职调查。
          - 与法律顾问、银行和金融机构协调。
          - 构建与客户和投资者目标一致的投资和所有权模式。
      development:
        title: 设计和开发管理
        description:
          - 总体规划、建筑与设计。
          - 协调顾问、承包商与项目团队。
          - 质量、环境目标与进度。
      marketing:
        title: 营销和销售执行
        description:
          - 品牌与上市策略。
          - 面向投资者与终端买家的推广。
          - 销售渠道与客户关系，以提高去化。
      financial:
        title: 财务和监管协调
        description:
          - 银行、会计师与审计师，对接融资与合规。
          - 财务报告、投资者关系与监管审批。
          - 从最初设想跟进到项目移交。
