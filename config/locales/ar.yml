              - استراتيجية التحول
              - تخطيط 2030+
            prompt: "هل تريد فهم والتحول نحو عمليات وتصميم أكثر استدامة؟"
            details: نقيم الممارسات المستدامة الحالية والقادمة، ثم نساعد في تحويل جزء أو كل نموذج التشغيل لديكم. هكذا تبقون في موقع تنافسي داخل صناعة تتجه بسرعة نحو الاستدامة حتى 2030 وما بعده.
          compliance:
